---
- name: Install mediastack dependencies
  ansible.builtin.apt:
    name:
      - sqlite3
      - xvfb
      - libxi6
      - libgconf-2-4
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libpango-1.0-0
      - libcairo2
      - libasound2
    state: present

# --- FlareSolverr ---
- name: Create FlareSolverr directory
  ansible.builtin.file:
    path: /opt/flaresolverr
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_group }}"

- name: Download and install FlareSolverr
  ansible.builtin.shell: |
    mkdir -p /opt/flaresolverr/temp
    curl -sL https://github.com/FlareSolverr/FlareSolverr/releases/download/{{ flaresolverr_version }}/flaresolverr_linux_x64.tar.gz | tar -xz -C /opt/flaresolverr/temp
    REAL_PATH=$(find /opt/flaresolverr/temp -name flaresolverr -type f -exec dirname {} \;)
    mv $REAL_PATH/* /opt/flaresolverr/ && rm -rf /opt/flaresolverr/temp
    chown -R {{ media_user }}:{{ media_group }} /opt/flaresolverr
    chmod +x /opt/flaresolverr/flaresolverr
  args:
    creates: /opt/flaresolverr/flaresolverr

- name: Deploy FlareSolverr systemd service
  ansible.builtin.template:
    src: flaresolverr.service.j2
    dest: /etc/systemd/system/flaresolverr.service
  notify: restart flaresolverr

# --- Arr Apps (Radarr, Sonarr, Prowlarr) ---
- name: Create Arr app directories
  ansible.builtin.file:
    path: "/opt/{{ item.name }}"
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_group }}"
  loop: "{{ arr_apps }}"

- name: Download and install Arr apps
  ansible.builtin.shell: |
    curl -sL "{{ item.url }}" | tar -xz -C /opt/{{ item.name }} --strip-components=1
    chown -R {{ media_user }}:{{ media_group }} /opt/{{ item.name }}
  args:
    creates: "/opt/{{ item.name }}/{{ item.name | capitalize }}"
  loop: "{{ arr_apps }}"

- name: Create Arr app data directories
  ansible.builtin.file:
    path: "/var/lib/{{ item.name }}"
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_group }}"
  loop: "{{ arr_apps }}"

- name: Deploy Arr systemd services
  ansible.builtin.template:
    src: arr.service.j2
    dest: "/etc/systemd/system/{{ item.name }}.service"
  loop: "{{ arr_apps }}"
  notify: reload systemd

- name: Enable and start Arr services
  ansible.builtin.systemd:
    name: "{{ item.name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop: "{{ arr_apps }}"

# --- Transmission ---
- name: Install Transmission
  ansible.builtin.apt:
    name: transmission-daemon
    state: present

- name: Stop Transmission for configuration
  ansible.builtin.systemd:
    name: transmission-daemon
    state: stopped

- name: Create Transmission systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/transmission-daemon.service.d
    state: directory

- name: Deploy Transmission systemd override
  ansible.builtin.template:
    src: transmission-override.conf.j2
    dest: /etc/systemd/system/transmission-daemon.service.d/override.conf
  notify: restart transmission

- name: Configure Transmission settings
  ansible.builtin.lineinfile:
    path: /etc/transmission-daemon/settings.json
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '"rpc-authentication-required"', line: '    "rpc-authentication-required": true,' }
    - { regexp: '"rpc-username"', line: '    "rpc-username": "{{ transmission_user }}",' }
    - { regexp: '"rpc-password"', line: '    "rpc-password": "{{ transmission_pass }}",' }
    - { regexp: '"rpc-whitelist-enabled"', line: '    "rpc-whitelist-enabled": false,' }
    - { regexp: '"download-dir"', line: '    "download-dir": "{{ transmission_download_dir }}",' }
  notify: restart transmission

- name: Start Transmission
  ansible.builtin.systemd:
    name: transmission-daemon
    state: started
    enabled: yes
    daemon_reload: yes
