---
- name: Install Tailscale
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Authenticate Tailscale
  ansible.builtin.command: "tailscale up --authkey {{ ts_auth_key }} --accept-routes"
  when: ts_auth_key is defined and ts_auth_key | length > 0
  register: ts_result
  changed_when: ts_result.rc == 0
  failed_when: false
