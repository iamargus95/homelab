name: Deploy

on:
  workflow_dispatch:
    inputs:
      pve1_host:
        description: 'Tailscale IP of pve1'
        required: true
      pve2_host:
        description: 'Tailscale IP of pve2'
        required: true

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Homelab
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # --- Network: Connect runner to Tailscale ---
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Tailscale routes
        run: |
          for host in ${{ inputs.pve1_host }} ${{ inputs.pve2_host }}; do
            for i in $(seq 1 10); do
              if tailscale ping -c 1 --timeout 5s "$host" >/dev/null 2>&1; then
                echo "$host reachable"
                break
              fi
              sleep 2
            done
          done

      # --- SSH: Set up key for Proxmox access ---
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" > ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # --- Install tools ---
      - uses: opentofu/setup-opentofu@v1

      - name: Symlink tofu as terraform
        run: ln -sf "$(which tofu)" /usr/local/bin/terraform

      - uses: plumber-cd/setup-terraform-backend-git@v1

      - name: Install Ansible
        run: pip install ansible paramiko

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install community.general community.proxmox

      - name: Write Ansible Vault file
        working-directory: ansible
        run: |
          printf '%s\n' \
            "vault_container_password: \"${{ secrets.CONTAINER_PASSWORD }}\"" \
            "vault_ts_auth_key: \"${{ secrets.TS_AUTH_KEY }}\"" \
            "vault_transmission_user: \"${{ secrets.TRANSMISSION_USER }}\"" \
            "vault_transmission_pass: \"${{ secrets.TRANSMISSION_PASS }}\"" \
            "vault_immich_db_password: \"${{ secrets.IMMICH_DB_PASSWORD }}\"" \
            "vault_immich_user: \"${{ secrets.IMMICH_USER }}\"" \
            "vault_immich_pass: \"${{ secrets.IMMICH_PASS }}\"" \
            > vault.yml

      - name: Write Ansible inventory
        working-directory: ansible/inventory
        run: |
          sed \
            -e "s/<PVE1_TAILSCALE_IP>/${{ inputs.pve1_host }}/g" \
            -e "s/<PVE2_TAILSCALE_IP>/${{ inputs.pve2_host }}/g" \
            hosts.yml.example > hosts.yml

      # --- Phase 1: Host preparation (Ansible) ---
      - name: "Phase 1: Prepare Proxmox hosts"
        working-directory: ansible
        run: ansible-playbook playbooks/host-setup.yml

      - name: "Phase 1b: Ensure pve2 -> pve1 SSH key for immich-backup"
        working-directory: ansible
        run: ansible-playbook playbooks/pve-cross-ssh.yml

      # --- Phase 2: Infrastructure provisioning (OpenTofu) ---
      - name: Tofu Init
        working-directory: terraform
        run: |
          terraform-backend-git git \
            --repository "https://github.com/${{ github.repository }}.git" \
            --ref tf-state \
            --state homelab/terraform.tfstate \
            terraform init -input=false
        env:
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: "Phase 2: Provision containers"
        working-directory: terraform
        run: |
          terraform-backend-git git \
            --repository "https://github.com/${{ github.repository }}.git" \
            --ref tf-state \
            --state homelab/terraform.tfstate \
            terraform apply -refresh-only -auto-approve -input=false

          terraform-backend-git git \
            --repository "https://github.com/${{ github.repository }}.git" \
            --ref tf-state \
            --state homelab/terraform.tfstate \
            terraform apply -auto-approve -input=false
        env:
          GIT_USERNAME: x-access-token
          GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_container_password: ${{ secrets.CONTAINER_PASSWORD }}
          TF_VAR_pve1_ssh_host: ${{ inputs.pve1_host }}
          TF_VAR_pve2_ssh_host: ${{ inputs.pve2_host }}

      # --- Phase 3: Configuration management (Ansible) ---
      # Run the per-container playbooks in parallel. Each one targets a
      # different host group (jellyfin, transmission, adguard, immich, pve2),
      # so there's no shared state to contend for. Output is grouped per
      # playbook via GitHub Actions log groups so they stay readable even
      # though they interleave. Exit non-zero if ANY playbook failed.
      - name: "Phase 3: Configure containers (parallel)"
        working-directory: ansible
        run: |
          set +e
          names=(jellyfin transmission adguard immich immich-backup)
          pids=()
          mkdir -p /tmp/ansible-logs
          for p in "${names[@]}"; do
            ansible-playbook "playbooks/${p}.yml" > "/tmp/ansible-logs/${p}.log" 2>&1 &
            pids+=($!)
            echo "spawned ${p} (pid $!)"
          done

          rc=0
          for i in "${!names[@]}"; do
            wait "${pids[i]}"
            code=$?
            if [ "$code" -ne 0 ]; then
              echo "::error::${names[i]} FAILED (exit $code)"
              rc=1
            else
              echo "::notice::${names[i]} OK"
            fi
          done

          for p in "${names[@]}"; do
            echo "::group::ansible-playbook ${p}.yml"
            cat "/tmp/ansible-logs/${p}.log"
            echo "::endgroup::"
          done

          exit $rc

      # --- Cleanup ---
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f ansible/vault.yml
          rm -f ansible/inventory/hosts.yml
          rm -f ~/.ssh/id_ed25519
