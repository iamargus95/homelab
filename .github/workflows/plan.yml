name: Plan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tofu-plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1

      - uses: plumber-cd/setup-terraform-backend-git@v1

      - name: Tofu Init + Plan
        id: plan
        working-directory: terraform
        run: |
          terraform-backend-git git \
            --repository "https://github.com/${{ github.repository }}.git" \
            --ref tf-state \
            --state homelab/terraform.tfstate \
            -- tofu init -input=false

          terraform-backend-git git \
            --repository "https://github.com/${{ github.repository }}.git" \
            --ref tf-state \
            --state homelab/terraform.tfstate \
            -- tofu plan -no-color -input=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_container_password: ${{ secrets.CONTAINER_PASSWORD }}
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### OpenTofu Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Install collections
        working-directory: ansible
        run: ansible-galaxy collection install community.general community.proxmox

      - name: Ansible Lint
        working-directory: ansible
        run: ansible-lint -c .ansible-lint playbooks/
